        </ul>

  <div class="container py-5">
    <div class="card shadow mx-auto" style="max-width: 800px;">
      <div class="card-body p-4">
        <h3 class="mb-4">Create New Subrogation Claim</h3>
        <form id="claimForm" enctype="multipart/form-data">
          <div class="row g-3">
            <div class="col-md-6"><label for="policy_number" class="form-label">Policy Number</label><input id="policy_number" name="policy_number" class="form-control" placeholder="Enter policy number" title="Policy Number" required></div>
            <div class="col-md-6"><label for="claimant_name" class="form-label">Claimant Name</label><input id="claimant_name" name="claimant_name" class="form-control" placeholder="Enter claimant full name" title="Claimant Name" required></div>
            <div class="col-md-6"><label for="insurer_a" class="form-label">Your Company (Insurer A)</label><input id="insurer_a" name="insurer_a" class="form-control" value="Subro Insurance" placeholder="Your insurer name" title="Your Company (Insurer A)" required></div>
            <div class="col-md-6"><label for="insurer_b" class="form-label">Counterparty (Insurer B)</label><input id="insurer_b" name="insurer_b" class="form-control" placeholder="Enter counterparty insurer" title="Counterparty (Insurer B)" required></div>
            <div class="col-md-6"><label for="accident_date" class="form-label">Accident Date</label><input id="accident_date" name="accident_date" type="date" class="form-control" title="Accident Date"></div>
            <div class="col-md-6"><label for="amount_paid" class="form-label">Amount Paid</label><input id="amount_paid" name="amount_paid" type="number" step="0.01" class="form-control" placeholder="0.00" title="Amount Paid"></div>
            <div class="col-12"><label for="description" class="form-label">Description</label><textarea id="description" name="description" rows="3" class="form-control" placeholder="Provide claim details and summary" title="Description"></textarea></div>
            <div class="col-12"><label for="documents" class="form-label">Evidence (PDF, images)</label><input id="documents" name="documents" type="file" multiple class="form-control" title="Evidence files"><div id="fileList" class="mt-2 small text-muted"></div></div>
            <div class="col-12"><div id="createMsg" class="text-danger mb-2"></div><button class="btn btn-primary w-100">Submit Claim</button></div>
          </div>
        </form>
      </div>
    </div>
  </div>
