<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>File a Complaint | Subro Insurance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-lg py-3">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3" href="index.html">Subro Insurance</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navComp" aria-controls="navComp" aria-expanded="false" aria-label="Toggle navigation menu" title="Toggle navigation menu"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navComp">
        <ul class="navbar-nav ms-auto fs-5">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="complaints-guide.html">Complaint Guide</a></li>
          <li class="nav-item"><a class="nav-link active" href="complaints.html">File a Complaint</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow">
          <div class="card-body p-4">
            <h3 class="mb-4">Submit a Complaint</h3>
            <form id="complaintForm" enctype="multipart/form-data">
              <div class="mb-3"><label for="type" class="form-label">Complaint Type *</label><select id="type" name="type" class="form-select" title="Complaint Type" required><option value="">Select type</option><option value="waiting_period">Waiting Period Dispute</option><option value="retrenchment">Retrenchment Claim Denial</option><option value="lapsed_policy">Lapsed Policy / Reinstatement</option><option value="non_payment">Non-payment of Premiums</option></select></div>
              <div class="mb-3"><label for="policyholder_name" class="form-label">Policyholder Name *</label><input id="policyholder_name" name="policyholder_name" class="form-control" placeholder="Enter policyholder full name" title="Policyholder Name" required></div>
              <div class="row"><div class="col-md-6 mb-3"><label for="policy_inception_date" class="form-label">Policy Inception Date</label><input id="policy_inception_date" name="policy_inception_date" type="date" class="form-control" title="Policy Inception Date"></div><div class="col-md-6 mb-3"><label for="incident_date" class="form-label">Incident Date</label><input id="incident_date" name="incident_date" type="date" class="form-control" title="Incident Date"></div></div>
              <div class="mb-3"><label for="rejection_reason" class="form-label">Rejection Reason (if any)</label><textarea id="rejection_reason" name="rejection_reason" rows="3" class="form-control" placeholder="Paste rejection details if available" title="Rejection Reason"></textarea></div>
              <div class="mb-3"><label for="policy_document" class="form-label">Policy Document (PDF)</label><input id="policy_document" name="policy_document" type="file" class="form-control" accept=".pdf" title="Policy Document"></div>
              <div class="mb-3"><label for="evidence" class="form-label">Additional Evidence</label><input id="evidence" name="evidence" type="file" multiple class="form-control" accept="image/*,application/pdf" title="Additional Evidence"><div id="fileList" class="mt-2 small text-muted"></div></div>
              <div class="mb-3"><label for="details" class="form-label">Detailed Description *</label><textarea id="details" name="details" rows="5" class="form-control" placeholder="Explain what happened and why you are disputing the decision" title="Detailed Description" required></textarea></div>
              <div id="msg" class="text-danger mb-3"></div>
              <button type="submit" class="btn btn-primary w-100">Submit Complaint</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-primary text-white py-4 mt-auto">
    <div class="container text-center small">&copy; 2025 Subro Insurance • info@subroinsurance.com • +1 800 123 4567</div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const token = localStorage.getItem("token");
      if (!token) return (window.location = "/");

      const form = document.getElementById("complaintForm");
      const msg = document.getElementById("msg");
      const evidenceInput = document.querySelector('input[name="evidence"]');
      const fileList = document.getElementById("fileList");

      evidenceInput.addEventListener("change", () => {
        fileList.innerHTML = "";
        for (const file of evidenceInput.files) fileList.innerHTML += `<div>${file.name}</div>`;
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.innerText = "";
        const fd = new FormData(form);
        try {
          const res = await fetch("/api/complaints", {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` },
            body: fd
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          alert("Complaint submitted. We will review it shortly.");
          window.location = "/dashboard.html";
        } catch (err) {
          msg.innerText = err.message;
        }
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
